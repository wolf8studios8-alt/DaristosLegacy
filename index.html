<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daristos' Legacy</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="overlay"></div>

<div id="game-container">
  <div class="header">
    <h1 class="game-title">Daristos' Legacy</h1>
    <div class="separator"></div>
  </div>
  
  <div id="story-content" class="fade-in">
    <div id="story-text"></div>
  </div>
  
  <div class="choices" id="choices-container"></div>
  
  <div id="controls-container">
    <button id="back-btn" class="control-btn" onclick="goBack()" disabled>⟵ Retroceder</button>
    <button id="reset-btn" class="control-btn" onclick="resetGame()">Reiniciar Partida</button>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/game.js"></script>
</body>
</html>
